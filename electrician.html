<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fixit Volt Matcher electrician dashboard for accepting jobs and managing active work.">
  <title>Electrician Dashboard - Fixit Volt Matcher</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js"></script>
</head>
<body>
  <nav class="navbar" aria-label="Electrician navigation">
    <div class="navbar-inner">
      <a class="logo" href="electrician.html" aria-label="Fixit Volt Matcher electrician dashboard">Fixit Volt Matcher</a>
      <div class="tab-nav" role="tablist" aria-label="Dashboard sections">
        <button class="tab-button is-active" type="button" data-tab="available">Available Jobs</button>
        <button class="tab-button" type="button" data-tab="active">My Active Jobs</button>
      </div>
      <div class="navbar-right">
        <label class="switch-wrap" for="availabilityToggle">
          <span id="availabilityLabel">Unavailable</span>
          <span class="switch">
            <input type="checkbox" id="availabilityToggle">
            <span class="switch-slider"></span>
          </span>
        </label>
        <a class="btn-secondary" href="profile.html">Profile</a>
        <button class="btn-danger" type="button" id="logoutBtn">Logout</button>
      </div>
      <button class="mobile-menu-toggle" type="button" aria-label="Open navigation menu" aria-controls="mobileMenu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="mobile-menu" id="mobileMenu" aria-hidden="true"></div>
    </div>
  </nav>

  <main class="dashboard page-shell">
    <div class="dashboard-header">
      <div class="dashboard-title">
        <h1>Electrician Dashboard</h1>
        <p>Review AI-diagnosed jobs, accept work, and keep customers updated.</p>
      </div>
    </div>

    <section class="section-panel" id="availableSection">
      <div class="catalog-grid" id="availableJobsGrid"></div>
    </section>

    <section class="section-panel hidden" id="activeSection">
      <div class="jobs-list" id="activeJobsList"></div>
    </section>
  </main>

  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal-box modal-wide" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalCloseBtn" type="button" aria-label="Close modal">&times;</button>
      <div id="modalContent"></div>
    </div>
  </div>
  <script src="js/electrician.js"></script>
</body>
</html>
