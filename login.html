<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to your Fixit Volt Matcher account.">
  <title>Login - Fixit Volt Matcher</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/ui-enhancements.css">
  <script src="js/config.js"></script>
</head>
<body>
  <nav class="navbar" aria-label="Main navigation">
    <div class="navbar-inner">
      <a class="logo" href="index.html" aria-label="Fixit Volt Matcher home">Fixit Volt Matcher</a>
      <div class="nav-actions">
        <a class="btn-secondary" href="register.html">Register</a>
      </div>
      <button class="mobile-menu-toggle" type="button" aria-label="Open navigation menu" aria-controls="mobileMenu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="mobile-menu" id="mobileMenu" aria-hidden="true"></div>
    </div>
  </nav>

  <main class="auth-page">
    <section class="card auth-card">
      <h1>Welcome Back</h1>
      <p class="auth-subtitle">Log in to continue with Fixit Volt Matcher.</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>

        <label class="checkbox-card">
          <input type="checkbox" id="rememberMe">
          Remember me
        </label>

        <button class="btn-primary btn-full" id="loginBtn" type="submit">Login</button>
      </form>

      <p class="auth-footer">
        <button class="text-link" id="forgotToggleBtn" type="button">Forgot password?</button>
      </p>

      <div class="forgot-panel hidden" id="forgotPanel">
        <form id="forgotForm" novalidate>
          <div class="form-group">
            <label for="forgotEmail">Email</label>
            <input type="email" id="forgotEmail" autocomplete="email" required>
          </div>
          <button class="btn-secondary btn-full" id="sendResetBtn" type="submit">Send reset link</button>
        </form>
      </div>

      <p class="auth-footer">No account yet? <a href="register.html">Create one</a></p>
    </section>
  </main>
  <script src="js/login.js"></script>
</body>
</html>
