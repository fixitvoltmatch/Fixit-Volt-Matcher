<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fixit Volt Matcher job chat.">
  <title>Chat - Fixit Volt Matcher</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/ui-enhancements.css">
  <script src="js/config.js"></script>
</head>
<body class="chat-page-body">
  <div class="chat-container">
    <header class="chat-header">
      <button class="btn-secondary" id="backBtn" type="button">Back</button>
      <div class="chat-title-wrap">
        <h1 id="chatTitle">Loading chat...</h1>
        <span class="badge badge-status-pending" id="chatStatus">Pending</span>
      </div>
      <button class="mobile-menu-toggle" type="button" aria-label="Open navigation menu" aria-controls="chatMobileMenu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="mobile-menu" id="chatMobileMenu" aria-hidden="true">
        <button class="mobile-menu-link" type="button" data-mobile-back="true">Back</button>
      </div>
    </header>

    <main class="messages-area" id="messagesArea" aria-live="polite"></main>

    <div class="chat-input-area">
      <form class="chat-form" id="messageForm" novalidate>
        <label class="hidden" for="messageInput">Message</label>
        <textarea id="messageInput" placeholder="Type your message..."></textarea>

        <div class="chat-attachment-area">
          <button class="chat-image-btn" id="chatImageTrigger" type="button" title="Attach image (optional)" aria-label="Attach image">📷</button>
          <input class="hidden" type="file" id="chatImageInput" accept="image/*">

          <div class="chat-image-preview-wrap" id="chatImagePreviewWrap">
            <img class="chat-image-preview" id="chatImagePreview" alt="Selected chat image preview">
            <div class="image-preview-meta">
              <div class="image-preview-text">
                <span class="image-preview-name" id="chatImagePreviewName"></span>
                <span class="image-preview-size" id="chatImagePreviewSize"></span>
              </div>
              <button class="image-remove-btn" id="chatRemoveImageBtn" type="button" aria-label="Remove selected image">&times;</button>
            </div>
          </div>
        </div>

        <button class="btn-primary" id="sendBtn" type="submit">Send</button>
      </form>
    </div>
  </div>
  <script src="js/chat.js"></script>
</body>
</html>
