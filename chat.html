<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fixit Volt Matcher job chat.">
  <title>Chat - Fixit Volt Matcher</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js"></script>
</head>
<body class="chat-page-body">
  <div class="chat-container">
    <header class="chat-header">
      <button class="btn-secondary" id="backBtn" type="button">Back</button>
      <div class="chat-title-wrap">
        <h1 id="chatTitle">Loading chat...</h1>
        <span class="badge badge-status-pending" id="chatStatus">Pending</span>
      </div>
    </header>

    <main class="messages-area" id="messagesArea" aria-live="polite"></main>

    <div class="chat-input-area">
      <form class="chat-form" id="messageForm" novalidate>
        <label class="hidden" for="messageInput">Message</label>
        <textarea id="messageInput" placeholder="Type your message..." required></textarea>
        <button class="btn-primary" id="sendBtn" type="submit">Send</button>
      </form>
    </div>
  </div>
  <script src="js/chat.js"></script>
</body>
</html>
