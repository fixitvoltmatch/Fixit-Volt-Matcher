<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your Fixit Volt Matcher password.">
  <title>Reset Password - Fixit Volt Matcher</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <nav class="navbar" aria-label="Main navigation">
    <div class="navbar-inner">
      <a class="logo" href="index.html" aria-label="Fixit Volt Matcher home">Fixit Volt Matcher</a>
      <div class="nav-actions">
        <a class="btn-secondary" href="login.html">Back to Login</a>
      </div>
      <button class="mobile-menu-toggle" type="button" aria-label="Open navigation menu" aria-controls="mobileMenu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="mobile-menu" id="mobileMenu" aria-hidden="true"></div>
    </div>
  </nav>

  <main class="auth-page">
    <section class="card auth-card">
      <!-- Initial loading state -->
      <div id="loadingState" class="reset-state">
        <h1>Verifying reset link...</h1>
        <p class="auth-subtitle">Please wait while we verify your password reset link.</p>
      </div>

      <!-- Error state -->
      <div id="errorState" class="reset-state hidden">
        <h1>Reset Link Invalid</h1>
        <p class="auth-subtitle">This reset link is invalid or has expired. Please request a new one.</p>
        <button class="btn-primary btn-full" onclick="window.location.href='login.html'">Request new reset link</button>
      </div>

      <!-- Password reset form -->
      <div id="resetFormState" class="reset-state hidden">
        <h1>Set New Password</h1>
        <p class="auth-subtitle">Enter your new password below.</p>

        <form id="resetForm" novalidate>
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" required>
            <span class="form-error hidden" id="passwordError"></span>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required>
            <span class="form-error hidden" id="confirmError"></span>
          </div>

          <button class="btn-primary btn-full" id="resetBtn" type="submit">Reset Password</button>
        </form>

        <p class="auth-footer">
          <a href="login.html">Back to login</a>
        </p>
      </div>
    </section>
  </main>

  <script>
    // Supabase configuration
    const SUPABASE_URL = 'https://zthgrdpebfhxssrzuipn.supabase.co';
    const ANON_KEY = 'sb_publishable_0Nx_I-pahy66Zbpa0UXUQQ_osJpIIM6';

    let supabaseClient;
    let tokenHash;
    let resetType;

    document.addEventListener('DOMContentLoaded', initResetPasswordPage);

    async function initResetPasswordPage() {
      // Initialize Supabase client
      supabaseClient = supabase.createClient(SUPABASE_URL, ANON_KEY);

      // Get token_hash and type from URL query params
      const params = new URLSearchParams(window.location.search);
      tokenHash = params.get('token_hash');
      resetType = params.get('type');

      // Verify OTP
      if (tokenHash && resetType) {
        await verifyResetToken();
      } else {
        showErrorState();
      }
    }

    async function verifyResetToken() {
      try {
        const { data, error } = await supabaseClient.auth.verifyOtp({
          token_hash: tokenHash,
          type: 'recovery'
        });

        if (error) {
          console.error('OTP verification failed:', error);
          showErrorState();
        } else {
          // User is temporarily signed in, show password reset form
          showResetForm();
        }
      } catch (err) {
        console.error('Error verifying reset token:', err);
        showErrorState();
      }
    }

    function showErrorState() {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('resetFormState').classList.add('hidden');
      document.getElementById('errorState').classList.remove('hidden');
    }

    function showResetForm() {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('errorState').classList.add('hidden');
      document.getElementById('resetFormState').classList.remove('hidden');

      // Attach form listeners
      const resetForm = document.getElementById('resetForm');
      resetForm.addEventListener('submit', handlePasswordReset);

      // Clear errors on input
      Array.from(resetForm.querySelectorAll('input')).forEach((input) => {
        input.addEventListener('input', () => clearFieldError(input));
      });
    }

    function clearFieldError(input) {
      const errorId = input.id === 'newPassword' ? 'passwordError' : 'confirmError';
      document.getElementById(errorId).classList.add('hidden');
    }

    async function handlePasswordReset(event) {
      event.preventDefault();

      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const resetBtn = document.getElementById('resetBtn');

      // Validate passwords match
      if (newPassword !== confirmPassword) {
        document.getElementById('confirmError').textContent = 'Passwords do not match';
        document.getElementById('confirmError').classList.remove('hidden');
        return;
      }

      // Validate minimum length
      if (newPassword.length < 8) {
        document.getElementById('passwordError').textContent = 'Password must be at least 8 characters';
        document.getElementById('passwordError').classList.remove('hidden');
        return;
      }

      // Show loading state
      resetBtn.disabled = true;
      resetBtn.classList.add('is-loading');

      try {
        // Update password
        const { error } = await supabaseClient.auth.updateUser({
          password: newPassword
        });

        if (error) {
          showToast('Failed to update password. Try again', 'error');
          resetBtn.disabled = false;
          resetBtn.classList.remove('is-loading');
        } else {
          // Sign out the user
          await supabaseClient.auth.signOut();

          // Clear localStorage
          localStorage.clear();

          // Show success message
          showToast('Password updated successfully! Please login', 'success');

          // Redirect to login after 2 seconds
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        }
      } catch (err) {
        console.error('Error updating password:', err);
        showToast('Failed to update password. Try again', 'error');
        resetBtn.disabled = false;
        resetBtn.classList.remove('is-loading');
      }
    }
  </script>
</body>
</html>
