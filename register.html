<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a Fixit Volt Matcher account as a customer or electrician.">
  <title>Register - Fixit Volt Matcher</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/ui-enhancements.css">
  <script src="js/config.js"></script>
</head>
<body>
  <nav class="navbar" aria-label="Main navigation">
    <div class="navbar-inner">
      <a class="logo" href="index.html" aria-label="Fixit Volt Matcher home">Fixit Volt Matcher</a>
      <div class="nav-actions">
        <a class="btn-secondary" href="login.html">Login</a>
      </div>
      <button class="mobile-menu-toggle" type="button" aria-label="Open navigation menu" aria-controls="mobileMenu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="mobile-menu" id="mobileMenu" aria-hidden="true"></div>
    </div>
  </nav>

  <main class="auth-page">
    <section class="card auth-card" id="registerCard">
      <div id="registrationFormWrap">
        <h1>Create Account</h1>
        <p class="auth-subtitle">Join Fixit Volt Matcher and get connected to the right electrical help.</p>

        <form id="registerForm" novalidate>
          <div class="form-grid">
            <div class="form-group full-width">
              <label for="fullName">Full name</label>
              <input type="text" id="fullName" name="full_name" autocomplete="name" required>
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" autocomplete="email" required>
            </div>

            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="text" id="phone" name="phone" autocomplete="tel" required>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required>
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm password</label>
              <input type="password" id="confirmPassword" name="confirm_password" autocomplete="new-password" required>
            </div>

            <div class="form-group full-width">
              <label for="city">City</label>
              <select id="city" name="city" autocomplete="address-level2" data-city-select="true" required>
                <option value="" disabled selected>Select your city</option>
              </select>
            </div>
          </div>

          <label>Role</label>
          <div class="role-toggle" role="group" aria-label="Choose account role">
            <button class="role-option is-selected" type="button" data-role="customer">Customer</button>
            <button class="role-option" type="button" data-role="electrician">Electrician</button>
          </div>

          <div id="electricianFields" class="hidden">
            <div class="form-group">
              <label>Electrical categories</label>
              <div class="skills-picker" id="skillsPicker">
                <p class="input-help">Loading categories...</p>
              </div>
            </div>

            <div class="form-group">
              <label for="bio">Bio</label>
              <textarea id="bio" name="bio" placeholder="describe your experience"></textarea>
            </div>

            <div class="form-group">
              <label for="experienceYears">Years of experience</label>
              <input type="number" id="experienceYears" name="experience_years" min="0" step="1">
            </div>
          </div>

          <button class="btn-primary btn-full" id="createAccountBtn" type="submit">Create Account</button>
        </form>

        <p class="auth-footer">Already have an account? <a href="login.html">Login</a></p>
      </div>

      <div id="otpSection" class="otp-section hidden">
        <h1>Verify Your Email</h1>
        <p class="auth-subtitle">We sent an 8 digit code to your email</p>

        <form id="otpForm" novalidate>
          <label class="hidden" for="otpCode">OTP code</label>
          <input class="otp-input" type="text" inputmode="numeric" pattern="[0-9]{8}" maxlength="8" id="otpCode" autocomplete="one-time-code" required>
          <button class="btn-primary btn-full" id="verifyOtpBtn" type="submit">Verify</button>
        </form>

        <p class="auth-footer">
          Didn't receive it?
          <button class="text-link" id="resendCodeBtn" type="button">Resend code</button>
        </p>
      </div>
    </section>
  </main>
  <script src="js/register.js"></script>
</body>
</html>
